name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: TaskC pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=L-F-Z&repo=TaskC
          path: profile/L-F-Z-TaskC-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: TaskC Demos pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=L-F-Z&repo=TaskC_Demos
          path: profile/L-F-Z-TaskC-Demos-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: CRI-T pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=L-F-Z&repo=cri-t
          path: profile/L-F-Z-CRI-T-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push